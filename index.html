
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSVEP-3D 手部模拟</title>
    <!-- 引入外部数据文件 -->
    <script src="hand_model_data.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* SSVEP 刺激块容器 */
        .stimulus-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .stimulus-block {
            position: absolute;
            width: 90px;
            height: 90px;
            background-color: #000;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s, left 0.5s cubic-bezier(0.4, 0, 0.2, 1), top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .stimulus-block span {
            pointer-events: none;
        }

        /* 调试面板 */
        #debug-panel {
            position: absolute;
            top: 68px;
            right: 20px;
            width: 260px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            z-index: 100;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .debug-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffcc;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-top: 10px;
        }

        .debug-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #debug-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 14px;
            background: rgba(20, 20, 20, 0.9);
            color: #00ffcc;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            backdrop-filter: blur(15px);
            cursor: pointer;
            z-index: 110;
        }

        #debug-toggle:hover {
            background: rgba(35, 35, 35, 0.95);
        }

        #debug-panel.hidden {
            opacity: 0;
            transform: translateX(24px);
            pointer-events: none;
        }

        input[type="range"] { width: 120px; }
        select { background: #333; color: white; border: none; padding: 4px; border-radius: 4px; width: 100px; }

        /* 加载状态提示 */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00ffcc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>正在从数据文件解析 3D 模型...</p>
    </div>

    <div id="canvas-container"></div>

    <!-- SSVEP 刺激块容器 -->
    <div class="stimulus-container" id="stim-container">
        <div class="stimulus-block" id="stim-thumb"><span>大拇指(6Hz)</span></div>
        <div class="stimulus-block" id="stim-index"><span>食指(7.5Hz)</span></div>
        <div class="stimulus-block" id="stim-middle"><span>中指(10Hz)</span></div>
        <div class="stimulus-block" id="stim-ring"><span>无名指(12Hz)</span></div>
        <div class="stimulus-block" id="stim-pinky"><span>小拇指(15Hz)</span></div>
    </div>

    <!-- 调试面板 -->
    <button id="debug-toggle" type="button">隐藏面板</button>
    <div id="debug-panel">
        <div class="debug-title">场景设置</div>
        <div class="debug-item">
            当前手侧: 
            <select id="hand-side">
                <option value="right" selected>右手 (Right)</option>
                <option value="left">左手 (Left)</option>
            </select>
        </div>

        <div class="debug-title">模型旋转校准</div>
        <div class="debug-item">X: <input type="range" id="rot-x" min="-3.14" max="3.14" step="0.01" value="1.57"></div>
        <div class="debug-item">Y: <input type="range" id="rot-y" min="-3.14" max="3.14" step="0.01" value="3.14"></div>
        <div class="debug-item">Z: <input type="range" id="rot-z" min="-3.14" max="3.14" step="0.01" value="1.57"></div>

        <div class="debug-title">骨骼动画控制</div>
        <div class="debug-item">
            弯曲轴: 
            <select id="bend-axis">
                <option value="x" selected>X 轴</option>
                <option value="y">Y 轴</option>
                <option value="z">Z 轴</option>
            </select>
        </div>
        <div class="debug-item">
            弯曲方向: 
            <select id="bend-dir">
                <option value="1">正向 (+)</option>
                <option value="-1" selected>负向 (-)</option>
            </select>
        </div>
        <div class="debug-item">
            显示骨骼: <input type="checkbox" id="show-skeleton">
        </div>
        <p style="font-size: 11px; color: #888; margin-top: 10px;">
            提示：点击色块模拟识别。大拇指采用对掌复合动画。
        </p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, model, skeletonHelper;
        let bones = { thumb: [], index: [], middle: [], ring: [], pinky: [] };
        let fingerStates = { thumb: 0, index: 0, middle: 0, ring: 0, pinky: 0 };
        let fingerTargets = { thumb: 0, index: 0, middle: 0, ring: 0, pinky: 0 };
        let currentHandSide = 'right';
        const frequencies = { thumb: 6, index: 7.5, middle: 10, ring: 12, pinky: 15 };

        function applyHandMaterial(material) {
            if (!material) return;

            material.color = new THREE.Color(0xf3c7b3);
            material.roughness = 0.82;
            material.metalness = 0.0;
            material.envMapIntensity = 0.28;

            if ('clearcoat' in material) {
                material.clearcoat = 0.08;
                material.clearcoatRoughness = 0.7;
            }

            if ('sheen' in material) {
                material.sheen = 0.12;
                material.sheenRoughness = 0.85;
                material.sheenColor = new THREE.Color(0xffd8cc);
            }

            material.needsUpdate = true;
        }

        function createLighting() {
            const hemisphere = new THREE.HemisphereLight(0xfff2e6, 0x0d1424, 0.9);
            scene.add(hemisphere);

            const keyLight = new THREE.DirectionalLight(0xffe0cf, 2.6);
            keyLight.position.set(-5, 8, 10);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.camera.near = 0.5;
            keyLight.shadow.camera.far = 35;
            keyLight.shadow.bias = -0.0008;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0xc7dbff, 1.1);
            fillLight.position.set(7, 2, 6);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffc8b0, 1.4);
            rimLight.position.set(4, 7, -8);
            scene.add(rimLight);

            const palmAccent = new THREE.PointLight(0xffd4c1, 18, 20, 2);
            palmAccent.position.set(0, -1.5, 6);
            scene.add(palmAccent);
        }

        function normalizeAngle(angle) {
            let normalized = angle;

            while (normalized > Math.PI) normalized -= Math.PI * 2;
            while (normalized < -Math.PI) normalized += Math.PI * 2;

            return normalized;
        }

        function updateDebugPanelVisibility() {
            const panel = document.getElementById('debug-panel');
            const toggle = document.getElementById('debug-toggle');
            const hidden = panel.classList.toggle('hidden');

            toggle.textContent = hidden ? '显示面板' : '隐藏面板';
        }

        // 初始化
        function init() {
            scene = new THREE.Scene();    
            scene.background = new THREE.Color(0x070b14);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);    
            camera.position.set(0, 1, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.physicallyCorrectLights = true;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.08;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createLighting();

            window.addEventListener('resize', onWindowResize, false);

            // 监听手侧切换
            document.getElementById('hand-side').addEventListener('change', (e) => {
                updateHandSide(e.target.value);
            });

            document.getElementById('debug-toggle').addEventListener('click', updateDebugPanelVisibility);

            // 模拟点击
            document.querySelectorAll('.stimulus-block').forEach(block => {
                block.addEventListener('click', () => {
                    const finger = block.id.replace('stim-', '');
                    fingerTargets[finger] = fingerTargets[finger] === 0 ? 1 : 0;
                });
            });

            // 开始加载模型
            loadModelFromJS();
            animate();
        }

        // 从 JS 变量中加载模型
        function loadModelFromJS() {
            if (typeof HAND_GLB_BASE64 === 'undefined') {
                alert("未检测到 hand_model_data.js 中的数据变量 HAND_GLB_BASE64。请检查文件是否存在并包含该变量。");
                return;
            }

            const loader = new THREE.GLTFLoader();
            // 自动补全 Base64 头部（如果只有纯 Base64 字符串）
            let data = HAND_GLB_BASE64;
            if (!data.startsWith('data:')) {
                data = 'data:application/octet-stream;base64,' + data;
            }
            
            loader.load(data, (gltf) => {
                setupModel(gltf.scene);
                document.getElementById('loading-overlay').style.display = 'none';
            }, undefined, (err) => {
                console.error("模型解析失败:", err);
                alert("模型数据解析失败，请确保 Base64 字符串正确。");
            });
        }

        function setupModel(obj) {
            model = obj;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // 自动缩放
            const scale = 8.5 / Math.max(size.x, size.y, size.z);
            model.scale.set(scale, scale, scale);
            
            // 基础位置居中
            model.position.set(-center.x * scale, -center.y * scale - 2, -center.z * scale);

            // 骨骼遍历与指节提取
            bones = { thumb: [], index: [], middle: [], ring: [], pinky: [] };
            model.traverse(n => {
                if (n.isMesh) {
                    n.castShadow = true;
                    n.receiveShadow = true;

                    if (Array.isArray(n.material)) {
                        n.material.forEach(applyHandMaterial);
                    } else {
                        applyHandMaterial(n.material);
                    }
                }

                if (n.isBone) {
                    const name = n.name.toLowerCase();
                    if (name.includes('thumb')) bones.thumb.push(n);
                    else if (name.includes('index')) bones.index.push(n);
                    else if (name.includes('middle')) bones.middle.push(n);
                    else if (name.includes('ring')) bones.ring.push(n);
                    else if (name.includes('pinky')) bones.pinky.push(n);
                }
            });

            // 剔除掌骨逻辑 (大拇指留末端2节，四指留末端3节)
            Object.keys(bones).forEach(k => {
                const limit = k === 'thumb' ? 2 : 3;
                if (bones[k].length > limit) bones[k] = bones[k].slice(-limit);
            });

            skeletonHelper = new THREE.SkeletonHelper(model);
            scene.add(model);
            scene.add(skeletonHelper);
            
            // 初始化手侧
            updateHandSide(document.getElementById('hand-side').value);
        }

        // 手侧镜像与刺激块映射逻辑
        function updateHandSide(side) {
            if (!model) return;
            currentHandSide = side;
            
            // 1. 物理镜像
            model.scale.x = Math.abs(model.scale.x) * (side === 'left' ? -1 : 1);
            
            // 2. 刺激块精准映射逻辑（以右手为基准坐标）
            const basePositions = {
                thumb:  { left: 82, top: 55 }, // 大拇指靠右下
                index:  { left: 66, top: 25 }, // 食指靠右中
                middle: { left: 50, top: 12 }, // 中指正中最高
                ring:   { left: 34, top: 22 }, // 无名指靠左中
                pinky:  { left: 18, top: 48 }  // 小拇指靠左下
            };

            Object.keys(basePositions).forEach(key => {
                const el = document.getElementById(`stim-${key}`);
                const pos = basePositions[key];
                const currentLeft = side === 'left' ? (100 - pos.left) : pos.left;


                el.style.left = `${currentLeft}%`;
                el.style.top = `${pos.top}%`;
                el.style.transform = `translateX(-50%)`; // 统一使用 -50% 居中对齐方块
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() / 1000;

            // 更新闪烁
            Object.keys(frequencies).forEach(key => {
                const isWhite = Math.floor(time * frequencies[key] * 2) % 2 === 0;
                const block = document.getElementById(`stim-${key}`);
                block.style.backgroundColor = isWhite ? '#fff' : '#000';
                block.style.color = isWhite ? '#000' : '#fff';
            });

            if (model) {
                // 面板控制参数同步
                const baseRotZ = parseFloat(document.getElementById('rot-z').value);
                const effectiveRotZ = normalizeAngle(
                    baseRotZ + (currentHandSide === 'left' ? Math.PI : 0)
                );

                model.rotation.set(
                    parseFloat(document.getElementById('rot-x').value),
                    parseFloat(document.getElementById('rot-y').value),
                    effectiveRotZ
                );
                skeletonHelper.visible = document.getElementById('show-skeleton').checked;

                // 动画插值
                const axis = document.getElementById('bend-axis').value;
                const dir = parseInt(document.getElementById('bend-dir').value);
                
                Object.keys(bones).forEach(f => {
                    fingerStates[f] += (fingerTargets[f] - fingerStates[f]) * 0.02;     // 时间常数为 0.02，即约 50 帧达到目标状态，提供平滑过渡
                    const s = fingerStates[f];

                    bones[f].forEach((b, i) => {
                        const maxBend = i === 0 ? 1.2 : 1.5; // 设定约 80-90 度的弯曲量
                        
                        if (f === 'thumb') {
                            // 大拇指复合轨迹 (模拟解剖学的对掌弯曲)
                            b.rotation.x = s * 0.8 * dir;
                            b.rotation.z = s * 0.1 * dir;
                            b.rotation.y = s * 0.2 * dir;
                        } else {
                            // 四指按设定轴向弯曲
                            b.rotation[axis] = s * maxBend * dir;
                        }
                    });
                });
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
